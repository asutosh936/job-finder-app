<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

  <!--/* th:fragment="panel" — profile slide-over: the resume every kit is built from.
         Reads resumeText, error from the model. */-->
  <div th:fragment="panel" id="profile-overlay" class="fixed inset-0 z-50 flex items-stretch justify-end bg-black/60">
    <div class="bg-surface-2 border-l border-hairline panel-edge w-full max-w-xl h-full overflow-y-auto p-6 flex flex-col gap-4">
      <div class="flex items-start justify-between gap-2">
        <div>
          <h2 class="font-display text-base font-semibold text-ink">Profile</h2>
          <p class="text-sm text-ink-subtle mt-1">
            Every cover letter, tailored resume, and brief is built from the resume on file here.
          </p>
        </div>
        <button type="button"
                onclick="document.getElementById('modal-root').innerHTML=''"
                class="text-ink-subtle hover:text-ink focus-ring rounded-md p-1 text-sm">
          Close
        </button>
      </div>

      <p th:if="${error != null}" class="text-xs" th:text="${error}" style="color: var(--status-rejected);">Error message</p>
      <p th:if="${resumeText == null or #strings.isEmpty(resumeText)}" class="text-xs text-ink-tertiary">
        Nothing on file yet. Paste your resume below or upload a PDF to get started.
      </p>

      <form th:hx-post="@{/profile}" enctype="multipart/form-data"
            hx-target="#profile-overlay" hx-swap="outerHTML"
            class="flex flex-col gap-4 flex-1">
        <div class="flex flex-col gap-1">
          <label class="text-xs text-ink-subtle">Upload resume PDF</label>
          <input type="file" name="resumeFile" accept="application/pdf"
                 class="w-full bg-surface-1 border border-hairline rounded-md px-3 py-2 text-sm text-ink file:mr-3 file:rounded-md file:border-0 file:bg-surface-3 file:text-ink file:px-3 file:py-1.5 focus-ring"/>
          <p class="text-xs text-ink-tertiary">Uploading a PDF replaces the text below with its extracted content.</p>
        </div>

        <div class="flex flex-col gap-1 flex-1">
          <label class="text-xs text-ink-subtle">Master resume text</label>
          <textarea name="resumeText" rows="16" th:text="${resumeText}"
                    placeholder="Paste your resume text here"
                    class="w-full flex-1 bg-surface-1 border border-hairline rounded-md px-3 py-2 text-sm text-ink placeholder:text-ink-tertiary focus-ring font-mono"></textarea>
        </div>

        <button type="submit"
                class="self-start text-sm font-medium px-3.5 py-2 rounded-md bg-primary text-on-primary hover:bg-primary-hover focus-ring">
          Save resume
        </button>
      </form>
    </div>
  </div>

</body>
</html>
