<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

  <!--/* th:fragment="card" — a single job card on the board */-->
  <div th:fragment="card(job)"
       class="job-card group bg-surface-1 border border-hairline rounded-lg p-3 flex flex-col gap-2 cursor-pointer hover:bg-surface-2 hover:border-hairline-strong transition-colors focus-ring"
       th:data-job-id="${job.id}"
       th:data-status="${job.status.name()}"
       th:hx-get="@{/jobs/{id}(id=${job.id})}" hx-target="#modal-root" hx-swap="innerHTML">
    <div class="flex items-start justify-between gap-2">
      <h3 class="font-display text-sm font-semibold text-ink leading-snug" th:text="${job.title}">Job Title</h3>
      <span th:class="'stamp stamp--' + ${#strings.toLowerCase(job.status.name())}"
            th:text="${#strings.toUpperCase(job.status.name())}">STATUS</span>
    </div>
    <p class="text-xs text-ink-subtle" th:text="${job.company}">Company</p>
    <p class="text-xs text-ink-tertiary" th:if="${job.location != null and !#strings.isEmpty(job.location)}" th:text="${job.location}">Location</p>
    <p class="ref-tag mt-1" th:text="'REF-' + ${#numbers.formatInteger(job.id, 4)}">REF-0001</p>
  </div>

</body>
</html>
