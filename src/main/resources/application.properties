spring.application.name=jobtracker

server.port=8083

# --- Database (H2, file-based) ---
spring.datasource.url=jdbc:h2:file:./data/jobtracker;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 console (handy for local inspection during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- File upload (resume PDF) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Claude API ---
claude.api.api-key=${CLAUDE_API_KEY}
claude.api.base-url=https://api.anthropic.com
claude.api.model=claude-sonnet-4-6
claude.api.version=2023-06-01
claude.api.max-tokens=4096
